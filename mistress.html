<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mistress Mariana</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600&display=swap');

        body {
            margin: 0; padding: 0;
            background: #000;
            color: #00ff9d;
            font-family: 'Exo 2', sans-serif;
            overflow: hidden;
        }

        canvas#matrix {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.15;
        }

        .content {
            position: relative;
            z-index: 2;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 5.2rem;
            color: #ff00aa;
            text-shadow: 0 0 30px #ff00aa, 0 0 60px #ff00aa;
            margin: 20px 0 10px 0;
            letter-spacing: 12px;
        }

        .main-image {
            max-width: 100%;
            height: auto;
            border: 4px solid #ff00aa;
            box-shadow: 0 0 50px #ff00aa;
            transition: all 0.5s ease;
        }
        .main-image:hover {
            content: url('https://i.postimg.cc/1zzQnxtk/second.png');
            box-shadow: 0 0 70px #ff00ff;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin: 50px auto;
            max-width: 1000px;
        }
        .gallery-grid img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            border: 2px solid #ff00aa;
            transition: 0.4s;
        }
        .gallery-grid img:hover {
            transform: scale(1.1);
            border-color: #00ff9d;
            box-shadow: 0 0 20px #00ff9d;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="content">
        <h1>MISTRESS MARIANA</h1>
        <p style="color:#ff00aa; font-size:1.5rem; margin-bottom:40px;"> kneel • obey • suffer beautifully</p>
        
        <img src="https://i.postimg.cc/vT29yw4R/main.png" class="main-image" alt="Mistress Mariana">
        
        <h2 style="margin:60px 0 25px 0; color:#ff00aa;">Gallery</h2>
        <div class="gallery-grid">
            <img src="https://i.postimg.cc/zXK1P7KB/160799614.jpg">
            <img src="https://i.postimg.cc/VLBG5QXt/1277725612.jpg">
            <img src="https://i.postimg.cc/pLC6cbTv/442553140.jpg">
            <img src="https://i.postimg.cc/cJJ5V9gn/465359430.jpg">
            <img src="https://i.postimg.cc/PqFFhWYF/578680630.jpg">
            <img src="https://i.postimg.cc/ZRBsqWLY/691887105.jpg">
            <img src="https://i.postimg.cc/yx0fF25w/751107663.jpg">
            <img src="https://i.postimg.cc/852KfTyR/989041751.jpg">
            <img src="https://i.postimg.cc/QC9X77b7/36772196-l.jpg">
            <img src="https://i.postimg.cc/mkHpzj7x/2f3970d8fe7b30c38fdf9c514a3630a5.png">
            <img src="https://i.postimg.cc/8CZ0qjTB/36772196-l.jpg">
            <img src="https://i.postimg.cc/mgNqymq6/676d34a024f61824120376bf.jpg">
            <img src="https://i.postimg.cc/8zB3mZ3x/6783c77e24f618241252794d.webp">
            <img src="https://i.postimg.cc/y8ztRMfr/757ad423-836b-47a3-8ad1-6f6770cd2121.webp">
            <img src="https://i.postimg.cc/2Sm9y46X/f4025f05ead62625cb0d6f5d4c0a4913.png">
        </div>
    </div>

    <!-- Matrix Rain Script -->
    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;

        const chars = "01アイウエオカキクケコ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff9d';
            ctx.font = `${fontSize}px monospace`;

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 35);

        window.addEventListener('resize', () => {
            canvas.height = window.innerHeight;
            canvas.width = window.innerWidth;
        });
    </script>
</body>
</html>
